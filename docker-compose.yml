version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: yt-todo-postgres
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yt-todo-backend
    environment:
      DATABASE_URL: postgres://todo:todo@postgres:5432/todo
      PORT: 3000
      NODE_ENV: development
      CORS_ORIGIN: "*"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "node dist/migrate.js && npm start"

volumes:
  postgres_data:
